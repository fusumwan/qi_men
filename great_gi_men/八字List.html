<html lang='zh-tw' mainfest="dqm.manifest">
<head>
<title>八字名單管理</title>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" type="text/css" href="pure-min.0.6.0.css" >
<link rel="stylesheet" type="text/css" href="dqm.css" >
<style>
#baziListApp { max-width: 100%; }
#baziListApp h1 { font-size: 5mm; margin: 2mm 0; }
#baziListApp .section-title { font-weight: bold; margin: 3mm 0 1mm; }
#baziTableWrap { overflow-x: auto; margin-top: 2mm; }
#baziTable { width: 100%; border-collapse: collapse; font-size: 3.5mm; }
#baziTable th, #baziTable td {
	border: 1px solid #ccc;
	padding: 2mm;
	text-align: center;
	vertical-align: middle;
}
#baziTable th { background: #f5f5f5; }
#baziTable .btn-del {
	min-height: 8mm;
	width: auto;
	padding: 1mm 3mm;
	font-size: 3.5mm;
}
#searchResult {
	margin-top: 2mm;
	padding: 2mm;
	border: 1px solid #ddd;
	background: #fafafa;
	min-height: 10mm;
	white-space: pre-wrap;
}
#baziListApp input[type="file"] { width: 100%; min-height: 10mm; }
@media only screen and (min-width: 700px) {
	#baziListApp { width: 700px; }
	#baziTable { font-size: 14px; }
}
</style>
<script src="js/string.js"></script>
<script src="js/jiqi.js"></script>
<script src="js/bazi.js"></script>
<script src="js/lunar.js"></script>
<script>
function updateSite(event) {
	window.applicationCache.swapCache();
}
window.applicationCache.addEventListener('updateready', updateSite, false);
</script>
</head>
<body>
<div id="baziListApp">
	<h1>八字名單管理</h1>

	<div class="section-title">新增資料</div>
	<div class="pure-g">
		<div class="pure-u-1-4">
			<input type="text" id="inpName" placeholder="人名" class="pure-input-1"/>
		</div>
		<div class="pure-u-1-8">
			<input type="number" id="inpYear" placeholder="年" class="pure-input-1"/>
		</div>
		<div class="pure-u-1-8">
			<select id="inpMonth" class="pure-input-1">
				<script>
					for (var i = 1; i < 13; i++)
						document.write('<option value="{0}">{0}月</option>'.format(i));
				</script>
			</select>
		</div>
		<div class="pure-u-1-8">
			<select id="inpDay" class="pure-input-1">
				<script>
					for (var i = 1; i < 32; i++)
						document.write('<option value="{0}">{0}日</option>'.format(i));
				</script>
			</select>
		</div>
		<div class="pure-u-1-8">
			<select id="inpHour" class="pure-input-1">
				<script>
					for (var i = 0; i < 24; i++)
						document.write('<option value="{0}">{0}時</option>'.format(i));
				</script>
			</select>
		</div>
		<div class="pure-u-1-8">
			<select id="inpMinute" class="pure-input-1">
				<script>
					for (var i = 0; i < 60; i++)
						document.write('<option value="{0}">{0}分</option>'.format(i));
				</script>
			</select>
		</div>
		<div class="pure-u-1-8">
			<select id="inpSecond" class="pure-input-1">
				<script>
					for (var i = 0; i < 60; i++)
						document.write('<option value="{0}">{0}秒</option>'.format(i));
				</script>
			</select>
		</div>
	</div>
	<div class="pure-g" style="margin-top:2mm;">
		<div class="pure-u-1-4">
			<button type="button" class="pure-button pure-button-primary pure-input-1" id="btnAdd">加入</button>
		</div>
	</div>

	<div class="hr"></div>

	<div class="section-title">搜尋</div>
	<div class="pure-g">
		<div class="pure-u-2-3">
			<input type="text" id="inpSearch" placeholder="輸入人名搜尋" class="pure-input-1"/>
		</div>
		<div class="pure-u-1-3">
			<button type="button" class="pure-button pure-input-1" id="btnSearch">搜尋</button>
		</div>
	</div>
	<div id="searchResult">（搜尋結果將顯示於此）</div>

	<div class="hr"></div>

	<div class="section-title">匯入 / 匯出 CSV</div>
	<div class="pure-g">
		<div class="pure-u-1-2">
			<input type="file" id="inpCsvFile" accept=".csv,text/csv"/>
		</div>
		<div class="pure-u-1-4">
			<button type="button" class="pure-button pure-input-1" id="btnImport">匯入 CSV</button>
		</div>
		<div class="pure-u-1-4">
			<button type="button" class="pure-button pure-input-1" id="btnExport">匯出 CSV</button>
		</div>
	</div>
	<div style="font-size:3mm;color:#666;margin-top:1mm;">
		CSV 欄位：人名,年,月,日,時,分,秒
	</div>

	<div class="hr"></div>

	<div class="section-title">已加入名單（<span id="recordCount">0</span> 筆）</div>
	<div id="baziTableWrap">
		<table id="baziTable">
			<thead>
				<tr>
					<th>人名</th>
					<th>出生時間</th>
					<th>年柱</th>
					<th>月柱</th>
					<th>日柱</th>
					<th>時柱</th>
					<th>八字</th>
					<th>操作</th>
				</tr>
			</thead>
			<tbody id="baziTableBody"></tbody>
		</table>
	</div>
</div>

<script>
(function() {
	"use strict";

	var STORAGE_KEY = "baziListRecords";
	var baziRecords = [];

	function nextId() {
		return "bz_" + Date.now() + "_" + Math.floor(Math.random() * 10000);
	}

	function parseIntField(val, def) {
		var n = parseInt(val, 10);
		return isNaN(n) ? def : n;
	}

	function splitPillar(gz) {
		return {
			gan: gz.charAt(0),
			zhi: gz.charAt(1)
		};
	}

	function buildRecord(name, year, month, day, hour, minute, second) {
		var jiqi = QIMEN_STAR.jiqi.GetJiqiInfo(year, month, day, hour, minute, second, 0);
		var bazi = jiqi.bazi || "";
		var yearGZ = bazi.substr(0, 2);
		var monthGZ = bazi.substr(2, 2);
		var dayGZ = bazi.substr(4, 2);
		var hourGZ = bazi.substr(6, 2);

		return {
			id: nextId(),
			name: name,
			year: year,
			month: month,
			day: day,
			hour: hour,
			minute: minute,
			second: second,
			bazi: bazi.substr(0, 8),
			pillars: {
				year: yearGZ,
				month: monthGZ,
				day: dayGZ,
				hour: hourGZ,
				yearGan: splitPillar(yearGZ).gan,
				yearZhi: splitPillar(yearGZ).zhi,
				monthGan: splitPillar(monthGZ).gan,
				monthZhi: splitPillar(monthGZ).zhi,
				dayGan: splitPillar(dayGZ).gan,
				dayZhi: splitPillar(dayGZ).zhi,
				hourGan: splitPillar(hourGZ).gan,
				hourZhi: splitPillar(hourGZ).zhi
			}
		};
	}

	function pad2(n) {
		return n < 10 ? "0" + n : String(n);
	}

	function formatBirthTime(rec) {
		return "{year}-{month}-{day} {hour}:{minute}:{second}".format({
			year: rec.year,
			month: pad2(rec.month),
			day: pad2(rec.day),
			hour: pad2(rec.hour),
			minute: pad2(rec.minute),
			second: pad2(rec.second)
		});
	}

	function saveRecords() {
		try {
			localStorage.setItem(STORAGE_KEY, JSON.stringify(baziRecords));
		} catch (e) {
			console.warn("無法寫入 localStorage", e);
		}
	}

	function loadRecords() {
		try {
			var raw = localStorage.getItem(STORAGE_KEY);
			if (raw) {
				var parsed = JSON.parse(raw);
				if (Array.isArray(parsed)) baziRecords = parsed;
			}
		} catch (e) {
			baziRecords = [];
		}
	}

	function renderTable() {
		var tbody = document.getElementById("baziTableBody");
		var html = [];

		baziRecords.forEach(function(rec) {
			html.push("<tr data-id=\"" + rec.id + "\">");
			html.push("<td>" + escapeHtml(rec.name) + "</td>");
			html.push("<td>" + formatBirthTime(rec) + "</td>");
			html.push("<td>" + rec.pillars.year + "</td>");
			html.push("<td>" + rec.pillars.month + "</td>");
			html.push("<td>" + rec.pillars.day + "</td>");
			html.push("<td>" + rec.pillars.hour + "</td>");
			html.push("<td>" + rec.bazi + "</td>");
			html.push("<td><button type=\"button\" class=\"pure-button btn-del\" data-del=\"" + rec.id + "\">刪除</button></td>");
			html.push("</tr>");
		});

		tbody.innerHTML = html.join("");
		document.getElementById("recordCount").innerText = String(baziRecords.length);
	}

	function escapeHtml(text) {
		return String(text)
			.replace(/&/g, "&amp;")
			.replace(/</g, "&lt;")
			.replace(/>/g, "&gt;")
			.replace(/"/g, "&quot;");
	}

	function readFormInput() {
		var name = document.getElementById("inpName").value.trim();
		var year = parseIntField(document.getElementById("inpYear").value, NaN);
		var month = parseIntField(document.getElementById("inpMonth").value, 1);
		var day = parseIntField(document.getElementById("inpDay").value, 1);
		var hour = parseIntField(document.getElementById("inpHour").value, 0);
		var minute = parseIntField(document.getElementById("inpMinute").value, 0);
		var second = parseIntField(document.getElementById("inpSecond").value, 0);
		return { name: name, year: year, month: month, day: day, hour: hour, minute: minute, second: second };
	}

	function validateInput(input, silent) {
		if (!input.name) {
			if (!silent) alert("請輸入人名");
			return false;
		}
		if (isNaN(input.year) || input.year < -8000 || input.year > 8001) {
			if (!silent) alert("請輸入有效年份");
			return false;
		}
		if (input.month < 1 || input.month > 12) {
			if (!silent) alert("月份須為 1–12");
			return false;
		}
		if (input.day < 1 || input.day > 31) {
			if (!silent) alert("日期無效");
			return false;
		}
		if (input.hour < 0 || input.hour > 23 ||
			input.minute < 0 || input.minute > 59 ||
			input.second < 0 || input.second > 59) {
			if (!silent) alert("時分秒數值無效");
			return false;
		}
		return true;
	}

	function addRecord(input, silent) {
		if (!validateInput(input, silent)) return false;
		var rec = buildRecord(input.name, input.year, input.month, input.day, input.hour, input.minute, input.second);
		baziRecords.push(rec);
		saveRecords();
		renderTable();
		return true;
	}

	function deleteRecord(id) {
		baziRecords = baziRecords.filter(function(r) { return r.id !== id; });
		saveRecords();
		renderTable();
	}

	function formatSearchResult(rec) {
		var p = rec.pillars;
		var lines = [];
		lines.push("人名：" + rec.name);
		lines.push("出生：" + formatBirthTime(rec));
		lines.push("完整八字：" + rec.bazi);
		lines.push("年柱：" + p.year + "（天干 " + p.yearGan + "，地支 " + p.yearZhi + "）");
		lines.push("月柱：" + p.month + "（天干 " + p.monthGan + "，地支 " + p.monthZhi + "）");
		lines.push("日柱：" + p.day + "（天干 " + p.dayGan + "，地支 " + p.dayZhi + "）");
		lines.push("時柱：" + p.hour + "（天干 " + p.hourGan + "，地支 " + p.hourZhi + "）");
		return lines.join("\n");
	}

	function searchByName(keyword) {
		var kw = keyword.trim();
		var box = document.getElementById("searchResult");
		if (!kw) {
			box.innerText = "請輸入人名";
			return;
		}
		var hits = baziRecords.filter(function(r) {
			return r.name.indexOf(kw) !== -1;
		});
		if (hits.length === 0) {
			box.innerText = "找不到符合「" + kw + "」的資料";
			return;
		}
		box.innerText = hits.map(formatSearchResult).join("\n\n────────────────\n\n");
	}

	function parseCsvLine(line) {
		var result = [];
		var cur = "";
		var inQuote = false;
		for (var i = 0; i < line.length; i++) {
			var ch = line.charAt(i);
			if (ch === '"') {
				if (inQuote && line.charAt(i + 1) === '"') {
					cur += '"';
					i++;
				} else {
					inQuote = !inQuote;
				}
			} else if (ch === "," && !inQuote) {
				result.push(cur);
				cur = "";
			} else {
				cur += ch;
			}
		}
		result.push(cur);
		return result.map(function(s) { return s.trim(); });
	}

	function importCsvText(text) {
		text = text.replace(/^\uFEFF/, "");
		var lines = text.split(/\r?\n/).filter(function(l) { return l.trim() !== ""; });
		if (lines.length === 0) {
			alert("CSV 檔案為空");
			return;
		}

		var startIdx = 0;
		var first = parseCsvLine(lines[0]);
		var headerMap = {};
		var expected = ["人名", "年", "月", "日", "時", "分", "秒"];
		var aliases = {
			"人名": ["人名", "姓名", "name", "Name"],
			"年": ["年", "year", "Year"],
			"月": ["月", "month", "Month"],
			"日": ["日", "day", "Day"],
			"時": ["時", "时", "hour", "Hour"],
			"分": ["分", "minute", "Minute"],
			"秒": ["秒", "second", "Second"]
		};

		var hasHeader = false;
		expected.forEach(function(key) {
			for (var i = 0; i < first.length; i++) {
				if (aliases[key].indexOf(first[i]) !== -1) {
					headerMap[key] = i;
					hasHeader = true;
				}
			}
		});

		if (!hasHeader) {
			headerMap = { "人名": 0, "年": 1, "月": 2, "日": 3, "時": 4, "分": 5, "秒": 6 };
		} else {
			startIdx = 1;
		}

		var added = 0;
		var failed = 0;

		for (var li = startIdx; li < lines.length; li++) {
			var cols = parseCsvLine(lines[li]);
			var input = {
				name: cols[headerMap["人名"]] || "",
				year: parseIntField(cols[headerMap["年"]], NaN),
				month: parseIntField(cols[headerMap["月"]], 1),
				day: parseIntField(cols[headerMap["日"]], 1),
				hour: parseIntField(cols[headerMap["時"]], 0),
				minute: parseIntField(cols[headerMap["分"]], 0),
				second: parseIntField(cols[headerMap["秒"]], 0)
			};
			if (addRecord(input, true)) added++;
			else failed++;
		}

		alert("匯入完成：成功 " + added + " 筆" + (failed ? "，略過 " + failed + " 筆" : ""));
	}

	function exportCsv() {
		if (baziRecords.length === 0) {
			alert("目前沒有資料可匯出");
			return;
		}
		var rows = [];
		rows.push(["人名", "年", "月", "日", "時", "分", "秒", "年柱", "月柱", "日柱", "時柱", "八字"].join(","));
		baziRecords.forEach(function(rec) {
			rows.push([
				csvCell(rec.name),
				rec.year,
				rec.month,
				rec.day,
				rec.hour,
				rec.minute,
				rec.second,
				rec.pillars.year,
				rec.pillars.month,
				rec.pillars.day,
				rec.pillars.hour,
				rec.bazi
			].join(","));
		});
		var blob = new Blob(["\uFEFF" + rows.join("\r\n")], { type: "text/csv;charset=utf-8;" });
		var url = URL.createObjectURL(blob);
		var a = document.createElement("a");
		a.href = url;
		a.download = "八字名單_" + new Date().toISOString().slice(0, 10) + ".csv";
		document.body.appendChild(a);
		a.click();
		document.body.removeChild(a);
		URL.revokeObjectURL(url);
	}

	function csvCell(text) {
		var s = String(text);
		if (/[",\r\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
		return s;
	}

	function initDefaultYear() {
		document.getElementById("inpYear").value = String(new Date().getFullYear());
	}

	document.getElementById("btnAdd").addEventListener("click", function() {
		addRecord(readFormInput());
	});

	document.getElementById("btnSearch").addEventListener("click", function() {
		searchByName(document.getElementById("inpSearch").value);
	});

	document.getElementById("inpSearch").addEventListener("keydown", function(e) {
		if (e.key === "Enter") searchByName(this.value);
	});

	document.getElementById("baziTableBody").addEventListener("click", function(e) {
		var btn = e.target.closest("[data-del]");
		if (!btn) return;
		if (confirm("確定刪除此筆資料？")) {
			deleteRecord(btn.getAttribute("data-del"));
		}
	});

	document.getElementById("btnImport").addEventListener("click", function() {
		var fileInput = document.getElementById("inpCsvFile");
		var file = fileInput.files && fileInput.files[0];
		if (!file) {
			alert("請先選擇 CSV 檔案");
			return;
		}
		var reader = new FileReader();
		reader.onload = function(ev) {
			importCsvText(String(ev.target.result || ""));
			fileInput.value = "";
		};
		reader.readAsText(file, "UTF-8");
	});

	document.getElementById("btnExport").addEventListener("click", exportCsv);

	loadRecords();
	initDefaultYear();
	renderTable();
})();
</script>
</body>
</html>
