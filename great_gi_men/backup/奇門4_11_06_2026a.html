<script>
	(function() {
		"use strict";
	
		var STORAGE_KEY = "baziListRecords";
		var baziRecords = [];
	
		function nextId() {
			return "bz_" + Date.now() + "_" + Math.floor(Math.random() * 10000);
		}
	
		function parseIntField(val, def) {
			var n = parseInt(val, 10);
			return isNaN(n) ? def : n;
		}
	
		function splitPillar(gz) {
			return { gan: gz.charAt(0), zhi: gz.charAt(1) };
		}
	
		function buildRecord(name, year, month, day, hour, minute, second) {
			var jiqi = QIMEN_STAR.jiqi.GetJiqiInfo(year, month, day, hour, minute, second, 0);
			var bazi = jiqi.bazi || "";
			var yearGZ = bazi.substr(0, 2);
			var monthGZ = bazi.substr(2, 2);
			var dayGZ = bazi.substr(4, 2);
			var hourGZ = bazi.substr(6, 2);
	
			return {
				id: nextId(),
				name: name,
				year: year,
				month: month,
				day: day,
				hour: hour,
				minute: minute,
				second: second,
				bazi: bazi.substr(0, 8),
				pillars: {
					year: yearGZ,
					month: monthGZ,
					day: dayGZ,
					hour: hourGZ,
					yearGan: splitPillar(yearGZ).gan,
					yearZhi: splitPillar(yearGZ).zhi,
					monthGan: splitPillar(monthGZ).gan,
					monthZhi: splitPillar(monthGZ).zhi,
					dayGan: splitPillar(dayGZ).gan,
					dayZhi: splitPillar(dayGZ).zhi,
					hourGan: splitPillar(hourGZ).gan,
					hourZhi: splitPillar(hourGZ).zhi
				}
			};
		}
	
		function pad2(n) {
			return n < 10 ? "0" + n : String(n);
		}
	
		function formatBirthTime(rec) {
			return "{year}-{month}-{day} {hour}:{minute}:{second}".format({
				year: rec.year,
				month: pad2(rec.month),
				day: pad2(rec.day),
				hour: pad2(rec.hour),
				minute: pad2(rec.minute),
				second: pad2(rec.second)
			});
		}
	
		function escapeHtml(text) {
			return String(text)
				.replace(/&/g, "&amp;")
				.replace(/</g, "&lt;")
				.replace(/>/g, "&gt;")
				.replace(/"/g, "&quot;");
		}
	
		function saveRecords() {
			try {
				localStorage.setItem(STORAGE_KEY, JSON.stringify(baziRecords));
			} catch (e) {
				console.warn("無法寫入 localStorage", e);
			}
		}
	
		function loadRecords() {
			try {
				var raw = localStorage.getItem(STORAGE_KEY);
				if (raw) {
					var parsed = JSON.parse(raw);
					if (Array.isArray(parsed)) baziRecords = parsed;
				}
			} catch (e) {
				baziRecords = [];
			}
		}
	
		function renderTable() {
			var tbody = document.getElementById("baziTableBody");
			if (!tbody) return;
			var html = [];
	
			baziRecords.forEach(function(rec) {
				html.push("<tr data-id=\"" + rec.id + "\">");
				html.push("<td>" + escapeHtml(rec.name) + "</td>");
				html.push("<td>" + formatBirthTime(rec) + "</td>");
				html.push("<td>" + rec.pillars.year + "</td>");
				html.push("<td>" + rec.pillars.month + "</td>");
				html.push("<td>" + rec.pillars.day + "</td>");
				html.push("<td>" + rec.pillars.hour + "</td>");
				html.push("<td>" + rec.bazi + "</td>");
				html.push("<td><button type=\"button\" class=\"pure-button btn-del\" data-del=\"" + rec.id + "\">刪除</button></td>");
				html.push("</tr>");
			});
	
			tbody.innerHTML = html.join("");
			var countEl = document.getElementById("recordCount");
			if (countEl) countEl.innerText = String(baziRecords.length);
		}
	
		function validateInput(input, silent) {
			if (!input.name) {
				if (!silent) alert("請輸入人名");
				return false;
			}
			if (isNaN(input.year) || input.year < -8000 || input.year > 8001) {
				if (!silent) alert("請輸入有效年份");
				return false;
			}
			if (input.month < 1 || input.month > 12) {
				if (!silent) alert("月份須為 1–12");
				return false;
			}
			if (input.day < 1 || input.day > 31) {
				if (!silent) alert("日期無效");
				return false;
			}
			if (input.hour < 0 || input.hour > 23 ||
				input.minute < 0 || input.minute > 59 ||
				input.second < 0 || input.second > 59) {
				if (!silent) alert("時分秒數值無效");
				return false;
			}
			return true;
		}
	
		function addRecord(input, silent) {
			if (!validateInput(input, silent)) return false;
			var rec = buildRecord(input.name, input.year, input.month, input.day, input.hour, input.minute, input.second);
			baziRecords.push(rec);
			saveRecords();
			renderTable();
			return true;
		}
	
		function deleteRecord(id) {
			baziRecords = baziRecords.filter(function(r) { return r.id !== id; });
			saveRecords();
			renderTable();
		}
	
		function parseCsvLine(line) {
			var result = [];
			var cur = "";
			var inQuote = false;
			for (var i = 0; i < line.length; i++) {
				var ch = line.charAt(i);
				if (ch === '"') {
					if (inQuote && line.charAt(i + 1) === '"') {
						cur += '"';
						i++;
					} else {
						inQuote = !inQuote;
					}
				} else if (ch === "," && !inQuote) {
					result.push(cur);
					cur = "";
				} else {
					cur += ch;
				}
			}
			result.push(cur);
			return result.map(function(s) { return s.trim(); });
		}
	
		function importCsvText(text) {
			text = text.replace(/^\uFEFF/, "");
			var lines = text.split(/\r?\n/).filter(function(l) { return l.trim() !== ""; });
			if (lines.length === 0) {
				alert("CSV 檔案為空");
				return;
			}
	
			var startIdx = 0;
			var first = parseCsvLine(lines[0]);
			var headerMap = {};
			var expected = ["人名", "年", "月", "日", "時", "分", "秒"];
			var aliases = {
				"人名": ["人名", "姓名", "name", "Name"],
				"年": ["年", "year", "Year"],
				"月": ["月", "month", "Month"],
				"日": ["日", "day", "Day"],
				"時": ["時", "时", "hour", "Hour"],
				"分": ["分", "minute", "Minute"],
				"秒": ["秒", "second", "Second"]
			};
	
			var hasHeader = false;
			expected.forEach(function(key) {
				for (var i = 0; i < first.length; i++) {
					if (aliases[key].indexOf(first[i]) !== -1) {
						headerMap[key] = i;
						hasHeader = true;
					}
				}
			});
	
			if (!hasHeader) {
				headerMap = { "人名": 0, "年": 1, "月": 2, "日": 3, "時": 4, "分": 5, "秒": 6 };
			} else {
				startIdx = 1;
			}
	
			var added = 0;
			var failed = 0;
	
			for (var li = startIdx; li < lines.length; li++) {
				var cols = parseCsvLine(lines[li]);
				var input = {
					name: cols[headerMap["人名"]] || "",
					year: parseIntField(cols[headerMap["年"]], NaN),
					month: parseIntField(cols[headerMap["月"]], 1),
					day: parseIntField(cols[headerMap["日"]], 1),
					hour: parseIntField(cols[headerMap["時"]], 0),
					minute: parseIntField(cols[headerMap["分"]], 0),
					second: parseIntField(cols[headerMap["秒"]], 0)
				};
				if (addRecord(input, true)) added++;
				else failed++;
			}
	
			alert("匯入完成：成功 " + added + " 筆" + (failed ? "，略過 " + failed + " 筆" : ""));
		}
	
		var btnImport = document.getElementById("btnImport");
		if (btnImport) {
			btnImport.addEventListener("click", function() {
				var fileInput = document.getElementById("inpCsvFile");
				var file = fileInput && fileInput.files && fileInput.files[0];
				if (!file) {
					alert("請先選擇 CSV 檔案");
					return;
				}
				var reader = new FileReader();
				reader.onload = function(ev) {
					importCsvText(String(ev.target.result || ""));
					fileInput.value = "";
				};
				reader.readAsText(file, "UTF-8");
			});
		}
	
		var tableBody = document.getElementById("baziTableBody");
		if (tableBody) {
			tableBody.addEventListener("click", function(e) {
				var btn = e.target.closest("[data-del]");
				if (!btn) return;
				if (confirm("確定刪除此筆資料？")) {
					deleteRecord(btn.getAttribute("data-del"));
				}
			});
		}
	
		loadRecords();
		renderTable();

		window.baziListApi = {
			getRecords: function() { return baziRecords.slice(); },
			reload: function() { loadRecords(); return baziRecords.slice(); }
		};
	})();
</script>
	
<script>
"use strict";
var gblDate = new Date();
var qs = window.location.href;
if(qs.indexOf('?')) {
	var id = qs.substr(qs.indexOf('?')+1);
	var patt1=/^[0-9]{4}[0-9]{2}[0-9]{2}-[0-9]{2}[0-9]{2}[0-9]{2}$/i;
	var patt2=/^[0-9]{4}[0-9]{2}[0-9]{2}-[0-9]{2}[0-9]{2}[0-9]{2}.[0-9]{1,3}$/i;
	var daysInMonth = [0,31,28,31,30,31,30,31,31,30,31,30,31];
	if(id.match(patt1)) {
		// If evenly divisible by 4 and not evenly divisible by 100,
		// or is evenly divisible by 400, then a leap year
		var y = (id.substr(0,4))*1;
		var m = (id.substr(4,2))*1 - 1;
		var d = (id.substr(6,2))*1;
		var h = (id.substr(9,2))*1;
		var i = (id.substr(11,2))*1;
		var s = (id.substr(13,2))*1;
		var ms = 0;
		gblDate = new Date(y,m,d,h,i,s,ms);
	} else if(id.match(patt2)) {
		// If evenly divisible by 4 and not evenly divisible by 100,
		// or is evenly divisible by 400, then a leap year
		var y = (id.substr(0,4))*1;
		var m = (id.substr(4,2))*1 - 1;
		var d = (id.substr(6,2))*1;
		var h = (id.substr(9,2))*1;
		var i = (id.substr(11,2))*1;
		var s = (id.substr(13,2))*1;
		var ms = (id.substr(16,3))*1;
		gblDate = new Date(y,m,d,h,i,s,ms);
	}
}
// Compute all Qimen data via the MVVM model (no legacy globals).

// =========================
// MVVM + OOP (ES6 classes)
// =========================
class QiMenModel {
	constructor(date) {
		this.date = date;
		this.jiqi = null;
		this.qimenInfo = null;
		this.qimenPan = null;
		this.gzid = null;
		this.compute();
	}

	setDate(date) {
		this.date = date;
		this.compute();
	}

	compute() {
		const d = this.date;
		this.jiqi = QIMEN_STAR.jiqi.GetJiqiInfo(
			d.getFullYear(),
			d.getMonth()+1,
			d.getDate(),
			d.getHours(),
			d.getMinutes(),
			d.getSeconds(),
			d.getMilliseconds()
		);
		this.qimenInfo = QIMEN_STAR.calc_kok(this.jiqi);
		this.qimenPan  = QIMEN_STAR.qimenCalc(
			this.qimenInfo.dun,
			this.qimenInfo.kook,

function sixJia(dayStemBranch) {
	if (dayStemBranch === '甲子') return '戊';
	if (dayStemBranch === '甲戌') return '己';
	if (dayStemBranch === '甲申') return '庚';
	if (dayStemBranch === '甲午') return '辛';
	if (dayStemBranch === '甲辰') return '壬';
	if (dayStemBranch === '甲寅') return '癸';
	return '';
}

function getBaziRecords(records) {
	if (Array.isArray(records)) return records;
	if (window.baziListApi && typeof window.baziListApi.getRecords === "function") {
		return window.baziListApi.getRecords();
	}
	return [];
}

function personDayStemForPan(pillars) {
	let stem = pillars.dayGan;
	const branch = pillars.dayZhi;
	return (stem === "甲") ? sixJia(stem + branch) : stem;
}

function personBaziAsThePalace(jiqi, qimenInfo, records) {
	if (!jiqi?.bazi || !qimenInfo) return [];

	const people = getBaziRecords(records);
	if (people.length === 0) return [];

	const palacesEnergies = ['坎一宮','坤二宮','震三宮','𢁉四宮','五宮/中宮','乾六宮','兌七宮','艮八宮','離九宮'];
	const godMap = {
		'符': '值符', '蛇': '螣蛇', '陰': '太陰', '合': '六合',
		'白': '白虎', '玄': '玄武', '地': '九地', '天': '九天'
	};
	const none = '無標示';
	const hourGZ = jiqi.bazi.substr(6, 2);
	const gzid = QIMEN_STAR.bazi.gz2idx(hourGZ);
	const hmon = "662792448318".substr(parseInt(gzid / 10, 10) * 2, 2);
	const pan = QIMEN_STAR.qimenCalc(qimenInfo.dun, qimenInfo.kook, hourGZ);
	const lines = [];

	for (let j = 1; j <= 9; j++) {
		const palace = palacesEnergies[j - 1];
		if (j === 5) continue;

		let dei = '，';
		let hung = '，';
		if (hmon[0] == j || hmon[1] == j) hung = 'Ｏ';
		if (pan['星'][j] === '苪') dei = pan['地'][5];

		const doorRaw = (dei + pan['門'][j] + '門' + pan['天'][j]).replace(/，/g, '');
		let tiangan = none;
		let bamen = none;
		if (doorRaw.length === 4) {
			tiangan = doorRaw[3];
			bamen = doorRaw.slice(1, 3);
		} else if (doorRaw.length === 3) {
			tiangan = doorRaw[2];
			bamen = doorRaw.slice(0, 2);
		}

		const dizhi = pan['地'][j] || none;
		const tianxing = pan['星'][j] ? '天' + pan['星'][j] : none;
		const shensha = godMap[pan['神'][j]] || none;
		const isEmpty = hung === 'Ｏ';
		const shenPart = isEmpty ? `${shensha} 空亡` : shensha;

		for (let i = 0; i < people.length; i++) {
			const name = people[i].name;
			const pillars = people[i].pillars;
			if (!pillars) continue;
			const dayStem = personDayStemForPan(pillars);

			if (tiangan === dayStem && tiangan !== none) {
				lines.push(
					`${name}:{行為位置【${palace}】{ 天干：${tiangan} | 地支：${dizhi} | 天星：${tianxing} | 神煞：${shenPart} | 八門：${bamen}  }}`
				);
			}
			if (dizhi === dayStem && dizhi !== none) {
				lines.push(
					`${name}:{角色位置【${palace}】{ 天干：${tiangan} | 地支：${dizhi} | 天星：${tianxing} | 神煞：${shenPart} | 八門：${bamen}  }}`
				);
			}
		}
	}
	return lines;
}

		if (hmon[0] == j || hmon[1] == j) hung = 'Ｏ';

		const doorRaw = (dei + pan['門'][j] + '門' + pan['天'][j]).replace(/，/g, '');
		let tiangan = none;
		let bamen = none;
		if (doorRaw.length === 4) {
			tiangan = doorRaw[3];
			bamen = doorRaw.slice(1, 3);
		} else if (doorRaw.length === 3) {
			tiangan = doorRaw[2];
			bamen = doorRaw.slice(0, 2);
		}

		const dizhi = pan['地'][j] || none;
		const tianxing = pan['星'][j] ? '天' + pan['星'][j] : none;
		const shensha = godMap[pan['神'][j]] || none;
		const isEmpty = hung === 'Ｏ';
		const shenPart = isEmpty ? `${shensha} 空亡` : shensha;

		if (tiangan === dayStem && tiangan !== none) {

			return;
		}

			alert("請輸入正確毫秒(大於-1小於1000)");
			return;
		}

			year,
			parseInt(document.querySelector("select[name=cboMonth]").value, 10) - 1,
			parseInt(document.querySelector("select[name=cboDay]").value, 10),
			parseInt(document.querySelector("select[name=cboHour]").value, 10),
			parseInt(document.querySelector("select[name=cboMinute]").value, 10),

		};

		const getEndDate = () => {
			const year = getNumber("input[name=txtYearEnd]");
			if (!Number.isFinite(year) || year < 1) return null;

			// Force end time (H/M/S/MS) to match start time.
			const h = getNumber("select[name=cboHour]");
			const m = getNumber("select[name=cboMinute]");
			const s = getNumber("select[name=cboSecond]");
			const ms = getNumber("input[name=txtMSec]");
			if (!Number.isFinite(ms) || ms < 0 || ms > 999) return null;

			return new Date(
				year,
				getNumber("select[name=cboMonthEnd]") - 1,
				getNumber("select[name=cboDayEnd]"),
				h,
				m,
				s,
				ms
			);
		};

		const pad2 = (n) => String(n).padStart(2, "0");
		const formatDMY = (d) => `${pad2(d.getDate())}-${pad2(d.getMonth()+1)}-${d.getFullYear()}`;
		const formatISO = (d) =>
			`${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())} ${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;

		const formatBazi4 = (bz) => {
			if (!bz || bz.length < 8) return "";
			return [
				`${bz.substr(0,2)}年`,
				`${bz.substr(2,2)}月`,
				`${bz.substr(4,2)}日`,
				`${bz.substr(6,2)}時`
			].join(" ");
		};

		const formatQimen = (jiqi, qimenInfo) => {
			if (!jiqi?.bazi || !qimenInfo) return "";

			const palacesEnergies = ['坎一宮','坤二宮','震三宮','𢁉四宮','五宮/中宮','乾六宮','兌七宮','艮八宮','離九宮'];
			const godMap = {
				'符': '值符', '蛇': '螣蛇', '陰': '太陰', '合': '六合',
				'白': '白虎', '玄': '玄武', '地': '九地', '天': '九天'
			};
			const bz = jiqi?.bazi || "";
			const bz_arr= bz.split(" ");
			const none = '無標示';
			const hourGZ = jiqi.bazi.substr(6, 2);
			const gzid = QIMEN_STAR.bazi.gz2idx(hourGZ);
			const hmon = "662792448318".substr(parseInt(gzid / 10, 10) * 2, 2);
			const pan = QIMEN_STAR.qimenCalc(qimenInfo.dun, qimenInfo.kook, hourGZ);
			const lines = [];

			for (let j = 1; j <= 9; j++) {
				const palace = palacesEnergies[j - 1];

				if (j === 5) {
					lines.push(
						`【${palace}】 天干：${none} | 地支：${none} | 天星：${none} | 神煞：${pan['地'][5] || none} | 八門：${none}`
					);
					continue;
				}

				let dei = '，';
				let hung = '，';
				if (hmon[0] == j || hmon[1] == j) hung = 'Ｏ';
				if (pan['星'][j] === '苪') dei = pan['地'][5];

				const doorRaw = (dei + pan['門'][j] + '門' + pan['天'][j]).replace(/，/g, '');
				let tiangan = none;
				let bamen = none;
				if (doorRaw.length === 4) {
					tiangan = doorRaw[3];
					bamen = doorRaw.slice(1, 3);
				} else if (doorRaw.length === 3) {
					tiangan = doorRaw[2];
					bamen = doorRaw.slice(0, 2);
				}

				const dizhi = pan['地'][j] || none;
				const tianxing = pan['星'][j] ? '天' + pan['星'][j] : none;
				const shensha = godMap[pan['神'][j]] || none;
				const isEmpty = hung === 'Ｏ';
				const shenPart = isEmpty ? `${shensha} 空亡` : shensha;

				lines.push(
					`【${palace}】{ 天干：${tiangan} | 地支：${dizhi} | 天星：${tianxing} | 神煞：${shenPart} | 八門：${bamen}  }`
				);
			}

			return "奇門："+lines;
		};
		const setStartInputsFromDate = (d) => {
			document.querySelector("input[name=txtYear]").value = d.getFullYear();
			document.querySelector("select[name=cboMonth]").value = d.getMonth() + 1;
			document.querySelector("select[name=cboDay]").value = d.getDate();
			document.querySelector("select[name=cboHour]").value = d.getHours();
			document.querySelector("select[name=cboMinute]").value = d.getMinutes();
			document.querySelector("select[name=cboSecond]").value = d.getSeconds();
			document.querySelector("input[name=txtMSec]").value = d.getMilliseconds();
			syncEndTimeFromStart();
		};

		const tbody = document.getElementById("tblRangeResultsBody");
		const hint = document.getElementById("rangeHint");

		btn.addEventListener("click", function(){
			// Always force end ms (and H/M/S) to equal start.
			syncEndTimeFromStart();

			const start = getStartDate();
			const end = getEndDate();
			if (!start || !end) {
				alert("請輸入正確起始/結束日期，且毫秒需為 0-999");
				return;
			}

			let s = start;
			let e = end;
			if (e.getTime() < s.getTime()) {
				const tmp = s; s = e; e = tmp;
			}

			// Total output records based on total days (inclusive).
			const maxRows = 20000; // safety cap
			const sYMD = Date.UTC(s.getFullYear(), s.getMonth(), s.getDate());
			const eYMD = Date.UTC(e.getFullYear(), e.getMonth(), e.getDate());
			const totalDays = Math.floor((eYMD - sYMD) / 86400000) + 1;
			if (totalDays > maxRows) {
				alert(`範圍太大：${totalDays} 筆（每天一筆）。請縮小範圍（上限 ${maxRows} 筆）。`);
				return;
			}

			if (tbody) tbody.innerHTML = "";
			if (hint) hint.innerText = `共 ${totalDays} 筆（每天一筆；點選任一筆會套用到起始時間並計算 + 匯出報告）`;

			for (let day = 0; day < totalDays; day++) {
				const d = new Date(s.getTime());
				d.setDate(d.getDate() + day);
				const t = d.getTime();
				const jiqi = QIMEN_STAR.jiqi.GetJiqiInfo(
					d.getFullYear(),
					d.getMonth()+1,
					d.getDate(),
					d.getHours(),
					d.getMinutes(),
					d.getSeconds(),
					d.getMilliseconds()
				);
				const bz = jiqi?.bazi || "";
				const qimenInfo = QIMEN_STAR.calc_kok(jiqi);

				const tr = document.createElement("tr");
				tr.style.cursor = "pointer";
				tr.dataset.ts = String(t);

				const td1 = document.createElement("td");
				td1.innerText = formatDMY(d);
				td1.title = formatISO(d);

				const td2 = document.createElement("td");
				td2.innerText = formatBazi4(bz);
				td2.title = bz;

				const td3 = document.createElement("td");
				td3.style.whiteSpace = "pre-line";
				td3.style.fontSize = "11px";
				td3.innerText = formatQimen(jiqi, qimenInfo);
				td3.title = qimenInfo.toString();

				const td4 = document.createElement("td");
				td4.style.whiteSpace = "pre-line";
				td4.style.fontSize = "11px";

				td4.innerText = "以人代宮[" + personAsThePalace(jiqi, qimenInfo).join('\n') + "]";

				td4.title = "以人代宮:行為位置、角色位置";

				tr.appendChild(td1);
				tr.appendChild(td2);
				tr.appendChild(td3);
				tr.appendChild(td4);

				tr.addEventListener("click", function(){
					const ts = parseInt(tr.dataset.ts, 10);
					if (!Number.isFinite(ts)) return;
					const clicked = new Date(ts);
					setStartInputsFromDate(clicked);
					calc();
					if (window.qimenViewModel) window.qimenViewModel.exportReport();
				});

				if (tbody) tbody.appendChild(tr);
			}
		});

		(function bindCopyTableResults(){
			const btnCopyTable = document.getElementById("btnCopyRangeTable");
			if (!btnCopyTable) return;

			const copyText = async (text) => {
				if (navigator.clipboard && navigator.clipboard.writeText) {
					await navigator.clipboard.writeText(text);
					return true;
				}
				// Fallback for older browsers / non-HTTPS contexts.
				const textarea = document.createElement("textarea");
				textarea.value = text;
				textarea.style.position = "fixed";
				textarea.style.left = "-9999px";
				textarea.style.top = "0";
				document.body.appendChild(textarea);
				textarea.focus();
				textarea.select();
				const ok = document.execCommand("copy");
				document.body.removeChild(textarea);
				return ok;
			};

			const tableToTSV = () => {
				const rows = [];
				rows.push(["Day-Month-Year", "八字", "奇門"].join("\t"));
				const trs = document.querySelectorAll("#tblRangeResultsBody tr");
				[].forEach.call(trs, (tr) => {
					const tds = tr.querySelectorAll("td");
					const c1 = (tds[0]?.innerText || "").replace(/\r?\n/g, " ").trim();
					const c2 = (tds[1]?.innerText || "").replace(/\r?\n/g, " ").trim();
					const c3 = (tds[2]?.innerText || "").replace(/\r?\n/g, " ").trim();
					const c4 = (tds[3]?.innerText || "").replace(/\r?\n/g, " ").trim();
					rows.push([c1, c2, c3, c4].join("\t"));
				});
				return rows.join("\n");
			};

			btnCopyTable.addEventListener("click", async function(){
				const text = tableToTSV();
				const trs = document.querySelectorAll("#tblRangeResultsBody tr");
				if (!trs || trs.length === 0) {
					alert("目前沒有列表可複製，請先按「產生列表」");
					return;
				}
				try {
					const ok = await copyText(text);
					if (ok) alert("表格結果已複製到剪貼簿！");
					else alert("複製失敗，請手動複製。");
				} catch (e) {
					alert("複製失敗，請手動複製。");
				}
			});
		})();
	})();
});
</script>
<script>

function parseQiMenBackgroundToJson() {
  const getText = (id) => document.getElementById(id)?.innerText.trim() || '';

  const result = {
    公曆日期時間: getText('lblDate'),            // 2025年06月06日21時03分47秒.959
    陰曆日期: getText('lblDateLunar'),           // 陰曆 2025年 5月 11日
    八字: [],                                     // ['乙巳年','壬午月',...]
    節氣: getText('lblJiqi'),                     // 芒種
    元: getText('lblYuen'),                       // 下
    遁: getText('lblDun'),                        // 陽
    局: getText('lblKok'),                        // 九
    值符天干: getText('lblFu'),                   // 沖
    值使門: getText('lblShi')                     // 傷
  };

  // 處理八字段落為陣列
  const baziRaw = document.getElementById('lblBazi')?.innerText || '';
  if (baziRaw) {
    result.八字 = baziRaw
      .replace(/，/g, '')
      .split(/(?<=..[年月日時分秒毫極元境])/)
      .map(s => s.trim())
      .filter(Boolean);
  }

  return result;
}


</script>
